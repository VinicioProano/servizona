<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  padding:0;
  text-align:center;
}

.contenedor {
  width: 100%;
  min-height:100vh;
  background: white;
  padding: 20px;
  box-sizing: border-box;
}

/* PC */
@media (min-width: 768px){
  body{
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .contenedor{
    max-width:420px;
    min-height:auto;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
  }
}

.logo{
width:120px;
margin-bottom:15px;
}

.titulo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:15px;
}

.boton{
background:#2e7d32;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
width:100%;
margin-top:15px;
}

.cancelar{
background:#c62828;
color:white;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
width:100%;
}

.rectificar{
background:#f9a825;
color:white;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
width:100%;
}

.tarjeta{
margin-top:20px;
padding:18px;
background:#eef4ff;
border-radius:10px;
border:1px solid #c9dafc;
}

.codigo{
font-size:20px;
font-weight:bold;
color:#1a237e;
}

</style>

</head>

<body>

<div class="contenedor">

<img src="https://drive.google.com/thumbnail?id=1MWx_2oZRgm-etwX17ALMb49uDV7s8ZaB&sz=w500" class="logo">

<div class="titulo">Registro de Cliente</div>

<input id="nombres" placeholder="Nombres">
<input id="apellidos" placeholder="Apellidos">
<input id="cedula" placeholder="Número de cédula" maxlength="10">
<input id="correo" placeholder="Correo electrónico">
<input id="celular" placeholder="Número de celular" maxlength="10">

<div style="margin-top:15px;">
<input type="checkbox" id="acepto"> Acepto términos y condiciones
</div>

<button id="btnSolicitar" class="boton" onclick="solicitarRegistro()">
SOLICITAR REGISTRO
</button>

<div id="mensaje"></div>

<div id="botonesFinal" style="display:none;">

<button class="cancelar" onclick="cancelar()">Cancelar</button>
<button class="rectificar" onclick="rectificar()">Rectificar</button>
<button class="boton" onclick="continuar()">Continuar</button>

</div>

</div>

<script>

/* INPUTS NUMERICOS */
document.getElementById("cedula").addEventListener("input",e=>e.target.value=e.target.value.replace(/\D/g,""));
document.getElementById("celular").addEventListener("input",e=>e.target.value=e.target.value.replace(/\D/g,""));

let codigoCliente=null;
let codigoActivacion=null;

/* VALIDAR */
function solicitarRegistro(){

const nombres=document.getElementById("nombres").value.trim();
const apellidos=document.getElementById("apellidos").value.trim();

if(!nombres||!apellidos){
alert("Completa los campos");
return;
}

/* SIMULACION (luego conectamos backend real) */
codigoCliente="CLI"+Math.floor(1000+Math.random()*9000);
codigoActivacion=Math.floor(1000+Math.random()*9000);

document.getElementById("mensaje").innerHTML=`
<div class="tarjeta">
Registro validado<br><br>

Código cliente:
<div class="codigo">${codigoCliente}</div>

Código activación:
<div class="codigo">${codigoActivacion}</div>
</div>
`;

document.getElementById("botonesFinal").style.display="block";

}

/* BOTONES */

function continuar(){
alert("Aquí conectamos con activación (siguiente paso)");
}

function rectificar(){
document.getElementById("mensaje").innerHTML="";
document.getElementById("botonesFinal").style.display="none";
}

function cancelar(){
if(confirm("¿Desea salir?")){
window.close();
}
}

/* INIT */
window.onload=function(){
document.getElementById("nombres").focus();
};

</script>

</body>
</html>
